name: CI

# Build check for pull requests. deploy.yml only runs on push to main (which
# auto-deploys), so this gates PRs: a build-breaking change shows red here
# before it can merge into the auto-deploying branch.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
